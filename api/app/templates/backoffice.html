<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudHelm Backoffice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-slate-950 font-['Space_Grotesk'] text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_12%_16%,rgba(10,132,255,0.3),transparent_42%),linear-gradient(180deg,#020817,#0b1426_48%,#020617)]"></div>

    <header class="border-b border-white/10 bg-slate-900/40 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <div>
          <p class="text-xs uppercase tracking-[0.2em] text-sky-200">CloudHelm</p>
          <h1 class="text-xl font-bold">Backoffice</h1>
        </div>
        <div class="flex items-center gap-2">
          <a href="/" class="rounded-lg border border-white/15 px-3 py-2 text-xs hover:bg-white/10">Ir para app</a>
          <button id="logout-btn" class="rounded-lg border border-white/15 px-3 py-2 text-xs hover:bg-white/10">Sair</button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl space-y-6 px-6 py-8">
      <section class="rounded-2xl border border-white/10 bg-slate-900/60 p-6">
        <h2 class="text-lg font-semibold">Configuracao de Engine IA</h2>
        <p class="mt-1 text-sm text-slate-300">Controle interno de provider/modelo/chave. Nao exposto ao usuario final.</p>
        <div class="mt-4 grid gap-3 md:grid-cols-2">
          <select id="llm-provider" class="rounded-xl border border-white/10 bg-slate-950/70 px-4 py-3 text-sm outline-none">
            <option value="none">Deterministico (sem IA)</option>
            <option value="openai">OpenAI (GPT)</option>
            <option value="gemini">Google Gemini</option>
          </select>
          <input id="llm-model" placeholder="Modelo (ex.: gpt-4o-mini)" class="rounded-xl border border-white/10 bg-slate-950/70 px-4 py-3 text-sm outline-none" />
          <input id="openai-key" type="password" placeholder="OpenAI key (sk-...)" class="rounded-xl border border-white/10 bg-slate-950/70 px-4 py-3 text-sm outline-none" />
          <input id="gemini-key" type="password" placeholder="Gemini key (AIza...)" class="rounded-xl border border-white/10 bg-slate-950/70 px-4 py-3 text-sm outline-none" />
        </div>
        <p id="llm-meta" class="mt-3 text-xs text-slate-400"></p>
        <div class="mt-4 flex gap-2">
          <button id="save-llm-btn" class="rounded-xl bg-sky-500 px-4 py-2 text-sm font-semibold text-slate-950 hover:bg-sky-400">Salvar Configuracao</button>
          <button id="reload-llm-btn" class="rounded-xl border border-white/20 px-4 py-2 text-sm hover:bg-white/10">Recarregar</button>
        </div>
      </section>

      <section class="rounded-2xl border border-white/10 bg-slate-900/60 p-6">
        <h2 class="text-lg font-semibold">Aprovacao de Usuarios (GitHub Login)</h2>
        <p class="mt-1 text-sm text-slate-300">Apenas usuarios aprovados conseguem usar a plataforma.</p>
        <div id="users-grid" class="mt-4 space-y-3"></div>
      </section>

      <p id="status" class="text-xs text-slate-300"></p>
    </main>

    <script src="/static/backoffice.js"></script>
  </body>
</html>
